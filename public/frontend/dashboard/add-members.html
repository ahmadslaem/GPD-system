<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>إضافة أفراد للأسرة</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="css/all.min.css">
  <link rel="stylesheet" href="css/css2.css">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>

<body>
  <div class="d-flex" id="app-wrapper">
    <div id="main-content" class="d-flex flex-column">
      <main id="content-area" class="flex-grow-1 p-3 p-md-4">
        <div class="page-header d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">
          <div>
            <h1 class="page-title"><i class="fa-solid fa-users me-2 text-primary"></i>إضافة أفراد للأسرة</h1>
            <p class="page-sub mb-0">إدراج أفراد الأسرة الجديدة أو الحالية</p>
          </div>
          <a href="families.html" class="btn btn-sm btn-outline-secondary">
            <i class="fa-solid fa-arrow-right me-1"></i>العودة إلى الأسر
          </a>
        </div>

        <div class="content-card">
          <div class="content-card__header">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
              <div>
                <div class="fw-bold" id="memberHeaderTitle">إضافة أفراد للأسرة</div>
                <div class="small text-muted" id="memberHeaderMeta">سيتم ربط الصفحة مع الأسرة المختارة</div>
              </div>
              <div class="badge bg-primary" id="memberFamilyBadge">—</div>
            </div>
          </div>

          <div class="content-card__body">
            <div class="form-card">
              <div class="form-card-title"><i class="fa-solid fa-user-group text-primary"></i>بيانات الأفراد</div>
              <div class="row g-3">
                <div class="col-12 col-md-6">
                  <label class="field-label">رقم الأسرة</label>
                  <input type="text" id="memberFamilyId" class="form-control" readonly style="background:#f8fafc;" />
                </div>
                <div class="col-12 col-md-6">
                  <label class="field-label">اسم رب الأسرة</label>
                  <input type="text" id="memberFamilyName" class="form-control" readonly style="background:#f8fafc;" />
                </div>
                <div class="col-12 col-md-6">
                  <label class="field-label">اسم الفرد</label>
                  <input type="text" class="form-control" placeholder="مثال: سارة أحمد" />
                </div>
                <div class="col-12 col-md-6">
                  <label class="field-label">رقم الهوية</label>
                  <input type="text" class="form-control" placeholder="مثال: 276-1985-0034" />
                </div>
                <div class="col-12 col-md-6">
                  <label class="field-label">صلة القرابة</label>
                  <select class="form-select">
                    <option>رب أسرة</option>
                    <option>زوجة</option>
                    <option>ابن</option>
                    <option>ابنة</option>
                    <option>أم</option>
                    <option>أخرى</option>
                  </select>
                </div>
                <div class="col-12 col-md-6">
                  <label class="field-label">تاريخ الميلاد</label>
                  <input type="date" class="form-control" />
                </div>
                <div class="col-12 col-md-6">
                  <label class="field-label">هل يوجد إعاقة؟</label>
                  <select class="form-select">
                    <option value="">اختر...</option>
                    <option value="yes">نعم</option>
                    <option value="no">لا</option>
                  </select>
                </div>
              </div>
              <div class="mt-3 text-end">
                <button class="btn btn-primary" id="btnAddMember">
                  <i class="fa-solid fa-plus me-1"></i>إضافة فرد
                </button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script>
    $(document).ready(function () {
      if (!NDS.auth.isLoggedIn()) {
        window.location.href = 'login.html';
        return;
      }
      if (!NDS.auth.can('edit_family') && !NDS.auth.can('register_family')) {
        window.location.href = 'index.html';
        return;
      }
      NDS.applyPermissions();

      var params = new URLSearchParams(window.location.search);
      var familyId = params.get('familyId');
      var familyName = params.get('familyName') || '—';

      $('#memberFamilyId').val(familyId || '—');
      $('#memberFamilyName').val(familyName || '—');
      $('#memberFamilyBadge').text(familyId || '—');
      $('#memberHeaderTitle').text('إضافة أفراد للأسرة');
      $('#memberHeaderMeta').text(familyName ? 'الأسرة: ' + familyName : 'سيتم ربط الصفحة مع الأسرة المختارة');

      $('#btnAddMember').on('click', async function (e) {
        e.preventDefault();
        var $inputs = $('.form-card input:not([readonly])');
        var $selects = $('.form-card select');
        var relation = $selects.eq(0).val();
        var payload = {
          name: $inputs.eq(0).val().trim(),
          national_id: $inputs.eq(1).val().trim() || null,
          gender: relation === 'زوجة' || relation === 'ابنة' || relation === 'أم' ? 'female' : 'male',
          birth_date: $inputs.eq(2).val() || null,
          has_disability: $selects.eq(1).val() === 'yes'
        };
        if (!familyId || !payload.name) {
          alert('يرجى اختيار الأسرة وإدخال اسم الفرد.');
          return;
        }
        try {
          await NDS.api.addMember(familyId, payload);
          alert('تمت إضافة الفرد بنجاح');
          window.location.href = 'family-view.html?familyId=' + encodeURIComponent(familyId);
        } catch (error) {
          alert(error.message || 'تعذر إضافة الفرد');
        }
      });
    });
  </script>
</body>

</html>
