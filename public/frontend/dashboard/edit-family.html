<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>تعديل أسرة</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="css/all.min.css">
  <link rel="stylesheet" href="css/css2.css">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head> 

<body>
  <div class="d-flex" id="app-wrapper">
    <div id="main-content" class="d-flex flex-column">
      <main id="content-area" class="flex-grow-1 p-3 p-md-4">

        <div class="page-header d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">
          <div>
            <h1 class="page-title"><i class="fa-solid fa-pen-to-square me-2 text-primary"></i>تعديل أسرة</h1>
            <p class="page-sub mb-0">تحديث بيانات الأسرة المختارة من قاعدة البيانات</p>
          </div>
          <div class="d-flex gap-2 flex-wrap">
            <a href="families.html" class="btn btn-sm btn-outline-secondary">
              <i class="fa-solid fa-arrow-right me-1"></i>العودة إلى قائمة الأسر
            </a>
          </div>
        </div>

        <div class="content-card">
          <div class="content-card__header">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
              <div>
                <div class="fw-bold" id="editHeaderTitle">تعديل بيانات الأسرة</div>
                <div class="small text-muted" id="editHeaderMeta">سيتم تحميل بيانات الأسرة تلقائياً</div>
              </div>
              <div class="badge bg-primary" id="editFamilyBadge">—</div>
            </div>
          </div>

          <div class="content-card__body">
            <div class="row g-3">
              <div class="col-12 col-lg-8">
                <div class="form-card">
                  <div class="form-card-title"><i class="fa-solid fa-user text-primary"></i>بيانات رب الأسرة</div>
                  <div class="row g-3">
                    <div class="col-12 col-sm-6">
                      <label class="field-label">رقم الأسرة</label>
                      <input type="text" id="editFamilyId" class="form-control" readonly style="background:#f8fafc;" />
                    </div>
                    <div class="col-12 col-sm-6">
                      <label class="field-label">رقم الهوية</label>
                      <input type="text" id="editNid" class="form-control" />
                    </div>
                    <div class="col-12 col-sm-6">
                      <label class="field-label">الاسم الكامل</label>
                      <input type="text" id="editName" class="form-control" />
                    </div>
                    <div class="col-12 col-sm-6">
                      <label class="field-label">رقم الهاتف</label>
                      <input type="tel" id="editPhone" class="form-control" />
                    </div>
                    <div class="col-12 col-sm-6">
                      <label class="field-label">المخيم الحالي</label>
                      <select id="editCamp" class="form-select">
                        <option value="">اختر المخيم...</option>
                        <option>مخيم جباليا</option>
                        <option>مخيم خان يونس</option>
                        <option>مواصي رفح</option>
                        <option>مخيم النصيرات</option>
                        <option>مخيم البريج</option>
                      </select>
                    </div>
                    <div class="col-12 col-sm-6">
                      <label class="field-label">المحافظة الأصلية</label>
                      <select id="editGov" class="form-select">
                        <option value="">اختر المحافظة...</option>
                        <option>شمال غزة</option>
                        <option>غزة</option>
                        <option>الوسطى</option>
                        <option>خان يونس</option>
                        <option>رفح</option>
                      </select>
                    </div>
                    <div class="col-12 col-sm-6">
                      <label class="field-label">رقم المأوى / الوحدة</label>
                      <input type="text" id="editShelter" class="form-control" />
                    </div>
                    <div class="col-12 col-sm-6">
                      <label class="field-label">المدينة / القرية الأصلية</label>
                      <input type="text" id="editCity" class="form-control" />
                    </div>
                  </div>
                </div>

                <div class="form-card">
                  <div class="form-card-title"><i class="fa-solid fa-people-roof text-primary"></i>تركيبة الأسرة</div>
                  <div class="row g-3">
                    <div class="col-6 col-sm-3">
                      <label class="field-label">إجمالي الأفراد</label>
                      <input type="number" id="editTotal" class="form-control" min="1" />
                    </div>
                    <div class="col-6 col-sm-3">
                      <label class="field-label">عدد البالغين</label>
                      <input type="number" id="editAdults" class="form-control" min="0" />
                    </div>
                    <div class="col-6 col-sm-3">
                      <label class="field-label">أطفال &lt;16</label>
                      <input type="number" id="editChildren" class="form-control" min="0" />
                    </div>
                    <div class="col-6 col-sm-3">
                      <label class="field-label">ذوو إعاقة</label>
                      <input type="number" id="editPwd" class="form-control" min="0" />
                    </div>
                  </div>

                  <div class="toggle-wrap mt-3">
                    <span class="toggle-text"><i class="fa-solid fa-venus me-2 text-danger"></i>أسرة برئاسة أنثى (FHH)</span>
                    <div class="form-check form-switch mb-0">
                      <input class="form-check-input" type="checkbox" id="editFhh" />
                    </div>
                  </div>
                  <div id="fhhReasonWrap" class="d-none mt-3">
                    <label class="field-label">سبب ترؤس الأنثى</label>
                    <select id="editFhhReason" class="form-select">
                      <option value="">اختر السبب...</option>
                      <option>وفاة رب الأسرة</option>
                      <option>فقدان رب الأسرة</option>
                      <option>إعاقة رب الأسرة</option>
                      <option>طلاق</option>
                      <option>أخرى</option>
                    </select>
                  </div>
                </div>
              </div>

              <div class="col-12 col-lg-4">
                <div class="form-card" style="position:sticky;top:72px;">
                  <div class="form-card-title"><i class="fa-solid fa-circle-info text-primary"></i>ملخص التعديل</div>
                  <div style="font-size:13px;color:#5a6a7a;line-height:1.9;">
                    <div><i class="fa-solid fa-hashtag me-2 text-muted"></i>رقم الأسرة: <strong id="sumId">—</strong></div>
                    <div><i class="fa-solid fa-user me-2 text-muted"></i>الاسم: <strong id="sumName">—</strong></div>
                    <div><i class="fa-solid fa-location-dot me-2 text-muted"></i>المخيم: <strong id="sumCamp">—</strong></div>
                    <div><i class="fa-solid fa-people-group me-2 text-muted"></i>الأفراد: <strong id="sumTotal">—</strong></div>
                  </div>
                  <div class="mt-3 text-center">
                    <button class="btn btn-primary w-100" id="btnSaveFamily">
                      <i class="fa-solid fa-floppy-disk me-1"></i>حفظ التعديلات
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script>
    $(document).ready(function () {
      var families = [
        { id: 'F-00847', nid: '276-1985-0034', name: 'أحمد محمد سليم الأغا', camp: 'مخيم جباليا', gov: 'رفح', shelter: 'B-14', phone: '059-456-7890', total: 7, adults: 3, children: 4, pwd: 2, fhh: true, fhhReason: 'وفاة رب الأسرة', city: 'رفح' },
        { id: 'F-00846', nid: '291-1979-0112', name: 'فاطمة إبراهيم النجار', camp: 'مخيم خان يونس', gov: 'غزة', shelter: 'A-22', phone: '059-222-3344', total: 4, adults: 2, children: 2, pwd: 0, fhh: false, fhhReason: '', city: 'غزة' },
        { id: 'F-00845', nid: '283-1992-0088', name: 'خالد يوسف الأغا', camp: 'مخيم النصيرات', gov: 'شمال غزة', shelter: 'C-07', phone: '059-887-6655', total: 9, adults: 3, children: 6, pwd: 1, fhh: false, fhhReason: '', city: 'بيت لاهيا' },
        { id: 'F-00844', nid: '265-1995-0208', name: 'منى صالح أبو غالي', camp: 'مواصي رفح', gov: 'رفح', shelter: 'D-01', phone: '059-111-2222', total: 5, adults: 3, children: 2, pwd: 0, fhh: true, fhhReason: 'طلاق', city: 'رفح' },
        { id: 'F-00843', nid: '298-1980-0033', name: 'سمير علي أبو ظاهر', camp: 'مخيم البريج', gov: 'الوسطى', shelter: 'E-18', phone: '059-333-4455', total: 6, adults: 4, children: 2, pwd: 1, fhh: false, fhhReason: '', city: 'الوسطى' }
      ];

      function toggleFhhReason() {
        $('#fhhReasonWrap').toggleClass('d-none', !$('#editFhh').is(':checked'));
      }

      function fillSummary(family) {
        $('#sumId').text(family.id);
        $('#sumName').text(family.name || '—');
        $('#sumCamp').text(family.camp || '—');
        $('#sumTotal').text(family.total || '—');
      }

      function loadFamily() {
        var params = new URLSearchParams(window.location.search);
        var familyId = params.get('familyId');
        var family = null;

        if (familyId) {
          family = families.find(function (item) { return item.id === familyId; });
        }

        if (!family) {
          var storedFamily = localStorage.getItem('nds_edit_family');
          if (storedFamily) {
            family = JSON.parse(storedFamily);
          }
        }

        if (!family) {
          $('#editHeaderTitle').text('لم يتم العثور على أسرة');
          $('#editHeaderMeta').text('راجع الرابط أو عد إلى قائمة الأسر');
          $('#editFamilyBadge').text('غير متوفر');
          return;
        }

        $('#editFamilyId').val(family.id);
        $('#editNid').val(family.nid || '');
        $('#editName').val(family.name || '');
        $('#editPhone').val(family.phone || '');
        $('#editCamp').val(family.camp || '');
        $('#editGov').val(family.gov || '');
        $('#editShelter').val(family.shelter || '');
        $('#editCity').val(family.city || '');
        $('#editTotal').val(family.total || '');
        $('#editAdults').val(family.adults || '');
        $('#editChildren').val(family.children || '');
        $('#editPwd').val(family.pwd || '');
        $('#editFhh').prop('checked', !!family.fhh);
        $('#editFhhReason').val(family.fhhReason || '');
        $('#editHeaderTitle').text('تعديل بيانات الأسرة');
        $('#editHeaderMeta').text('الأسرة: ' + (family.name || family.id));
        $('#editFamilyBadge').text(family.id || '—');
        fillSummary(family);
        toggleFhhReason();
      }

      $('#editFhh').on('change', toggleFhhReason);

      $('#btnSaveFamily').on('click', function () {
        var familyId = $('#editFamilyId').val();
        var familyName = $('#editName').val() || 'الأسرة';
        if (!familyId) {
          alert('لا توجد أسرة محددة للتعديل');
          return;
        }

        alert('تم حفظ التعديلات على ' + familyName + ' بنجاح');
        window.location.href = 'families.html';
      });

      if (window.location.pathname.split('/').pop() === 'edit-family.html') {
        $('.sidebar-nav .nav-link[data-page="families.html"]').addClass('active');
      }

      loadFamily();
    });
  </script>
</body>

</html>
