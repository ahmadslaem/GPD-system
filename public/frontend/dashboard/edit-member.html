<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>تعديل فرد</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="css/all.min.css">
  <link rel="stylesheet" href="css/css2.css">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>

<body>
  <div class="d-flex" id="app-wrapper">
    <div id="main-content" class="d-flex flex-column">
      <main id="content-area" class="flex-grow-1 p-3 p-md-4">
        <div class="page-header d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">
          <div>
            <h1 class="page-title"><i class="fa-solid fa-user-pen me-2 text-primary"></i>تعديل فرد</h1>
            <p class="page-sub mb-0">تعديل بيانات الفرد ضمن الأسرة المختارة</p>
          </div>
          <a href="family-view.html" class="btn btn-sm btn-outline-secondary">
            <i class="fa-solid fa-arrow-right me-1"></i>العودة إلى العرض
          </a>
        </div>

        <div class="content-card">
          <div class="content-card__header">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
              <div>
                <div class="fw-bold" id="memberHeaderTitle">تعديل فرد</div>
                <div class="small text-muted" id="memberHeaderMeta">سيتم تحميل بيانات الفرد المختار</div>
              </div>
              <div class="badge bg-primary" id="memberFamilyBadge">—</div>
            </div>
          </div>

          <div class="content-card__body">
            <div class="form-card">
              <div class="form-card-title"><i class="fa-solid fa-user text-primary"></i>بيانات الفرد</div>
              <div class="row g-3">
                <input type="hidden" id="memberId" />
                <div class="col-12 col-md-6">
                  <label class="field-label">رقم الأسرة</label>
                  <input type="text" id="memberFamilyId" class="form-control" readonly style="background:#f8fafc;" />
                </div>
                <div class="col-12 col-md-6">
                  <label class="field-label">اسم رب الأسرة</label>
                  <input type="text" id="memberFamilyName" class="form-control" readonly style="background:#f8fafc;" />
                </div>
                <div class="col-12 col-md-6">
                  <label class="field-label">اسم الفرد</label>
                  <input type="text" id="memberName" class="form-control" placeholder="مثال: سارة أحمد" />
                </div>
                <div class="col-12 col-md-6">
                  <label class="field-label">رقم الهوية</label>
                  <input type="text" id="memberNid" class="form-control" placeholder="مثال: 276-1985-0034" />
                </div>
                <div class="col-12 col-md-6">
                  <label class="field-label">صلة القرابة</label>
                  <select id="memberRelation" class="form-select">
                    <option>رب أسرة</option>
                    <option>زوجة</option>
                    <option>ابن</option>
                    <option>ابنة</option>
                    <option>أم</option>
                    <option>أخرى</option>
                  </select>
                </div>
                <div class="col-12 col-md-6">
                  <label class="field-label">تاريخ الميلاد</label>
                  <input type="date" id="memberDob" class="form-control" />
                </div>
                <div class="col-12 col-md-6">
                  <label class="field-label">هل يوجد إعاقة؟</label>
                  <select id="memberDisability" class="form-select">
                    <option value="">اختر...</option>
                    <option value="نعم">نعم</option>
                    <option value="لا">لا</option>
                  </select>
                </div>
              </div>
              <div class="mt-3 text-end">
                <button class="btn btn-primary" id="btnSaveMember">
                  <i class="fa-solid fa-floppy-disk me-1"></i>حفظ التعديلات
                </button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script>
    $(document).ready(function () {
      if (!NDS.auth.isLoggedIn()) {
        window.location.href = 'login.html';
        return;
      }
      if (!NDS.auth.can('edit_family')) {
        window.location.href = 'index.html';
        return;
      }
      NDS.applyPermissions();

      var params = new URLSearchParams(window.location.search);

      $('#memberId').val(params.get('memberId') || '');
      $('#memberFamilyId').val(params.get('familyId') || '—');
      $('#memberFamilyName').val(params.get('familyName') || '—');
      $('#memberName').val(params.get('memberName') || '');
      $('#memberNid').val(params.get('memberNid') || '');
      $('#memberRelation').val(params.get('memberRelation') || '');
      $('#memberDob').val(params.get('memberDob') || '');
      $('#memberDisability').val(params.get('memberDisability') || '');
      $('#memberFamilyBadge').text(params.get('familyId') || '—');
      $('#memberHeaderTitle').text('تعديل فرد');
      $('#memberHeaderMeta').text(params.get('memberName') ? 'تعديل بيانات: ' + params.get('memberName') : 'تعديل بيانات فرد');

      $('#btnSaveMember').on('click', async function (e) {
        e.preventDefault();
        var relation = $('#memberRelation').val();
        var payload = {
          name: $('#memberName').val().trim(),
          gender: relation === 'زوجة' || relation === 'ابنة' || relation === 'أم' ? 'female' : 'male',
          birth_date: $('#memberDob').val() || null
        };
        if (!$('#memberId').val() || !payload.name) {
          alert('يرجى إدخال اسم الفرد.');
          return;
        }
        try {
          await NDS.api.updateMember($('#memberId').val(), payload);
          alert('تم حفظ التعديلات');
          window.location.href = 'family-view.html?familyId=' + encodeURIComponent($('#memberFamilyId').val());
        } catch (error) {
          alert(error.message || 'تعذر حفظ بيانات الفرد');
        }
      });
    });
  </script>
</body>

</html>
