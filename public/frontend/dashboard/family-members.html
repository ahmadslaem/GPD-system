<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>عرض أفراد الأسرة</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="css/all.min.css">
  <link rel="stylesheet" href="css/css2.css">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>

<body>
  <div class="d-flex" id="app-wrapper">
    <div id="main-content" class="d-flex flex-column">
      <main id="content-area" class="flex-grow-1 p-3 p-md-4">
        <div class="page-header d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">
          <div>
            <h1 class="page-title"><i class="fa-solid fa-people-group me-2 text-primary"></i>أفراد الأسرة</h1>
            <p class="page-sub mb-0">عرض قائمة أفراد الأسرة مع إمكانية التعديل أو الحذف</p>
          </div>
          <div class="d-flex gap-2 flex-wrap">
            <a href="families.html" class="btn btn-sm btn-outline-secondary">
              <i class="fa-solid fa-arrow-right me-1"></i>العودة إلى الأسر
            </a>
            <a href="add-members.html" class="btn btn-sm btn-primary">
              <i class="fa-solid fa-plus me-1"></i>إضافة فرد جديد
            </a>
          </div>
        </div>

        <div class="content-card">
          <div class="content-card__header">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
              <div>
                <div class="fw-bold" id="familyTitle">أفراد الأسرة</div>
                <div class="small text-muted" id="familyMeta">سيتم تحميل بيانات الأسرة المختارة</div>
              </div>
              <div class="badge bg-primary" id="familyBadge">—</div>
            </div>
          </div>

          <div class="content-card__body">
            <div id="membersList"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/config.js"></script>
  <script src="js/layout.js"></script>
  <script>
    $(document).ready(function () {
      if (!NDS.auth.guardPage('families')) return;
      NDS.applyPermissions();

      var members = [];
      var familyId = new URLSearchParams(window.location.search).get('familyId') || localStorage.getItem('nds_current_family_id');
      var familyName = '—';

      function renderMembers() {
        if (!members.length) {
          $('#membersList').html('<div class="text-center text-muted py-4">لا يوجد أفراد مسجلون</div>');
          return;
        }

        var html = members.map(function (m) {
          var memberId = m.id || '';
          return `
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 p-3 mb-2 border rounded-3" style="background:#f8fafc;">
              <div>
                <div class="fw-bold">${m.name}</div>
                <div class="small text-muted">الهوية: ${m.national_id || '—'} · الميلاد: ${m.birth_date || '—'} · الجنس: ${m.gender === 'female' ? 'أنثى' : 'ذكر'} · إعاقة: ${m.has_disability ? 'نعم' : 'لا'}</div>
              </div>
              <div class="d-flex gap-2">
                <a class="btn btn-sm btn-outline-primary" title="تعديل" href="edit-member.html?memberId=${encodeURIComponent(memberId)}&familyId=${encodeURIComponent(familyId || '')}&familyName=${encodeURIComponent(familyName)}&memberName=${encodeURIComponent(m.name || '')}&memberNid=${encodeURIComponent(m.national_id || '')}&memberDob=${encodeURIComponent(m.birth_date || '')}&memberDisability=${encodeURIComponent(m.has_disability ? 'نعم' : 'لا')}"><i class="fa-solid fa-pen"></i></a>
                <button class="btn btn-sm btn-outline-danger btn-delete-member" data-id="${memberId}" title="حذف"><i class="fa-solid fa-trash"></i></button>
              </div>
            </div>`;
        }).join('');

        $('#membersList').html(html);
      }

      async function loadFamilyMembers() {
        if (!familyId) {
          $('#membersList').html('<div class="text-center text-danger py-4">لم يتم تحديد الأسرة</div>');
          return;
        }

        $('#membersList').html('<div class="text-center text-muted py-4">جارٍ تحميل الأفراد...</div>');
        try {
          var response = await NDS.api.family(familyId);
          var family = response.data || {};
          members = family.members || [];
          familyName = family.head_name || family.name || '—';
          $('#familyMeta').text('الأسرة: ' + familyName);
          $('#familyBadge').text(family.family_number || ('F-' + String(family.id || familyId).padStart(5, '0')));
          localStorage.setItem('nds_current_family_id', family.id || familyId);
          renderMembers();
        } catch (error) {
          $('#membersList').html('<div class="text-center text-danger py-4">' + (error.message || 'تعذر تحميل أفراد الأسرة') + '</div>');
        }
      }

      $(document).on('click', '.btn-delete-member', async function () {
        var memberId = $(this).data('id');
        if (!memberId || !confirm('هل تريد حذف هذا الفرد؟')) return;
        try {
          await NDS.api.deleteMember(memberId);
          await loadFamilyMembers();
        } catch (error) {
          alert(error.message || 'تعذر حذف الفرد');
        }
      });

      $('#familyTitle').text('أفراد الأسرة');
      loadFamilyMembers();
    });
  </script>
</body>

</html>
