<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>عرض العائلة</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="css/all.min.css">
  <link rel="stylesheet" href="css/css2.css">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>

<body>
  <div class="d-flex" id="app-wrapper">
    <div id="main-content" class="d-flex flex-column">
      <main id="content-area" class="flex-grow-1 p-3 p-md-4">
        <div class="page-header d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">
          <div>
            <h1 class="page-title"><i class="fa-solid fa-house-user me-2 text-primary"></i>عرض العائلة</h1>
            <p class="page-sub mb-0">عرض بيانات الأسرة والأفراد مع إمكانية التعديل أو الحذف</p>
          </div>
          <div class="d-flex gap-2 flex-wrap">
            <a href="families.html" class="btn btn-sm btn-outline-secondary">
              <i class="fa-solid fa-arrow-right me-1"></i>العودة إلى الأسر
            </a>
          </div>
        </div>

        <div class="content-card">
          <div class="content-card__header">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
              <div>
                <div class="fw-bold" id="familyTitle">العائلة</div>
                <div class="small text-muted" id="familyMeta">سيتم تحميل بيانات الأسرة المختارة</div>
              </div>
              <div class="badge bg-primary" id="familyBadge">—</div>
            </div>
          </div>

          <div class="content-card__body">
            <div class="form-card mb-3">
              <div class="form-card-title"><i class="fa-solid fa-user text-primary"></i>بيانات الأسرة</div>
              <div class="row g-3">
                <div class="col-12 col-md-6">
                  <label class="field-label">رقم الأسرة</label>
                  <input type="text" id="familyId" class="form-control" readonly style="background:#f8fafc;" />
                </div>
                <div class="col-12 col-md-6">
                  <label class="field-label">اسم رب الأسرة</label>
                  <input type="text" id="familyName" class="form-control" readonly style="background:#f8fafc;" />
                </div>
                <div class="col-12 col-md-6">
                  <label class="field-label">المخيم</label>
                  <input type="text" id="familyCamp" class="form-control" readonly style="background:#f8fafc;" />
                </div>
                <div class="col-12 col-md-6">
                  <label class="field-label">المحافظة</label>
                  <input type="text" id="familyGov" class="form-control" readonly style="background:#f8fafc;" />
                </div>
              </div>
            </div>

            <div class="form-card">
              <div class="form-card-title"><i class="fa-solid fa-users text-primary"></i>الأفراد</div>
              <div id="membersList"></div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
    <script>
    $(document).ready(function () {
      if (!NDS.auth.guardPage('families')) return;
      var params = new URLSearchParams(window.location.search);
      var familyId = params.get('familyId');
      var familyName = params.get('familyName') || '—';
      var members = [];

      function renderMembers() {
        if (!members.length) {
          $('#membersList').html('<div class="text-center text-muted py-3">لا يوجد أفراد مسجلون</div>');
          return;
        }
        $('#membersList').html(members.map(function (m) {
          var disability = m.has_disability ? 'نعم' : 'لا';
          return '<div class="d-flex justify-content-between align-items-center flex-wrap gap-2 p-3 mb-2 border rounded-3" style="background:#f8fafc;"><div><div class="fw-semibold">' + m.name + '</div><div class="small text-muted">' + (m.national_id || '-') + ' · ' + (m.gender === 'female' ? 'أنثى' : 'ذكر') + ' · إعاقة: ' + disability + '</div></div><div class="d-flex gap-2"><a href="edit-member.html?memberId=' + m.id + '&familyId=' + familyId + '&familyName=' + encodeURIComponent(familyName) + '&memberName=' + encodeURIComponent(m.name || '') + '&memberNid=' + encodeURIComponent(m.national_id || '') + '&memberDob=' + (m.birth_date || '') + '&memberDisability=' + encodeURIComponent(disability) + '" class="btn btn-sm btn-outline-primary" title="تعديل"><i class="fa-solid fa-pen"></i></a><button class="btn btn-sm btn-outline-danger btn-delete-member" data-id="' + m.id + '" title="حذف"><i class="fa-solid fa-trash"></i></button></div></div>';
        }).join(''));
      }

      async function loadFamily() {
        if (!familyId) return;
        $('#membersList').html('<div class="text-center text-muted py-3">جارٍ التحميل...</div>');
        try {
          var response = await NDS.api.family(familyId);
          var f = response.data || {};
          familyName = f.name || f.head_name || familyName;
          $('#familyId').val(f.family_number || familyId);
          $('#familyName').val(familyName);
          $('#familyCamp').val(f.camp || '—');
          $('#familyGov').val(f.gov || '—');
          $('#familyTitle').text('ملف الأسرة: ' + familyName);
          $('#familyMeta').text('عرض البيانات والأفراد المسجلين');
          $('#familyBadge').text(f.family_number || familyId);
          members = f.members || [];
          renderMembers();
        } catch (error) {
          $('#membersList').html('<div class="text-center text-danger py-3">' + (error.message || 'تعذر تحميل الأسرة') + '</div>');
        }
      }

      $(document).on('click', '.btn-delete-member', async function () {
        if (!confirm('هل تريد حذف هذا الفرد؟')) return;
        try {
          await NDS.api.deleteMember($(this).data('id'));
          await loadFamily();
        } catch (error) {
          alert(error.message || 'تعذر حذف الفرد');
        }
      });

      loadFamily();
    });
  </script>
</body>

</html>
