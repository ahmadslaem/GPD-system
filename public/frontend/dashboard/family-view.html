<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>عرض العائلة</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="css/all.min.css">
  <link rel="stylesheet" href="css/css2.css">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>

<body>
  <div class="d-flex" id="app-wrapper">
    <div id="main-content" class="d-flex flex-column">
      <main id="content-area" class="flex-grow-1 p-3 p-md-4">
        <div class="page-header d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">
          <div>
            <h1 class="page-title"><i class="fa-solid fa-house-user me-2 text-primary"></i>عرض العائلة</h1>
            <p class="page-sub mb-0">عرض بيانات الأسرة والأفراد مع إمكانية التعديل أو الحذف</p>
          </div>
          <div class="d-flex gap-2 flex-wrap">
            <a href="families.html" class="btn btn-sm btn-outline-secondary">
              <i class="fa-solid fa-arrow-right me-1"></i>العودة إلى الأسر
            </a>
          </div>
        </div>

        <div class="content-card">
          <div class="content-card__header">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
              <div>
                <div class="fw-bold" id="familyTitle">العائلة</div>
                <div class="small text-muted" id="familyMeta">سيتم تحميل بيانات الأسرة المختارة</div>
              </div>
              <div class="badge bg-primary" id="familyBadge">—</div>
            </div>
          </div>

          <div class="content-card__body">
            <div class="form-card mb-3">
              <div class="form-card-title"><i class="fa-solid fa-user text-primary"></i>بيانات الأسرة</div>
              <div class="row g-3">
                <div class="col-12 col-md-6">
                  <label class="field-label">رقم الأسرة</label>
                  <input type="text" id="familyId" class="form-control" readonly style="background:#f8fafc;" />
                </div>
                <div class="col-12 col-md-6">
                  <label class="field-label">اسم رب الأسرة</label>
                  <input type="text" id="familyName" class="form-control" readonly style="background:#f8fafc;" />
                </div>
                <div class="col-12 col-md-6">
                  <label class="field-label">المخيم</label>
                  <input type="text" id="familyCamp" class="form-control" readonly style="background:#f8fafc;" />
                </div>
                <div class="col-12 col-md-6">
                  <label class="field-label">المحافظة</label>
                  <input type="text" id="familyGov" class="form-control" readonly style="background:#f8fafc;" />
                </div>
              </div>
            </div>

            <div class="form-card">
              <div class="form-card-title"><i class="fa-solid fa-users text-primary"></i>الأفراد</div>
              <div id="membersList"></div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script>
    $(document).ready(function () {
      var members = [
        { id: 1, name: 'أحمد محمد سليم الأغا', relation: 'رب أسرة', nid: '276-1985-0034', dob: '1985-01-01', disability: 'نعم' },
        { id: 2, name: 'سارة أحمد', relation: 'زوجة', nid: '280-1990-0012', dob: '1990-05-12', disability: 'لا' },
        { id: 3, name: 'يوسف أحمد', relation: 'ابن', nid: '310-2010-0045', dob: '2010-09-20', disability: 'لا' },
        { id: 4, name: 'مريم أحمد', relation: 'ابنة', nid: '315-2014-0051', dob: '2014-03-08', disability: 'نعم' }
      ];

      function renderMembers() {
        var html = members.map(function (m) {
          return `
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 p-3 mb-2 border rounded-3" style="background:#f8fafc;">
              <div>
                <div class="fw-bold">${m.name}</div>
                <div class="small text-muted">${m.relation} · الهوية: ${m.nid} · الميلاد: ${m.dob} · إعاقة: ${m.disability}</div>
              </div>
              <div class="d-flex gap-2">
                <a href="edit-member.html?memberId=${m.id}&familyId=${familyId}&familyName=${encodeURIComponent(familyName)}&memberName=${encodeURIComponent(m.name)}&memberNid=${encodeURIComponent(m.nid)}&memberRelation=${encodeURIComponent(m.relation)}&memberDob=${m.dob}&memberDisability=${encodeURIComponent(m.disability)}" class="btn btn-sm btn-outline-primary" title="تعديل"><i class="fa-solid fa-pen"></i></a>
                <button class="btn btn-sm btn-outline-danger" title="حذف"><i class="fa-solid fa-trash"></i></button>
              </div>
            </div>`;
        }).join('');
        $('#membersList').html(html);
      }

      var params = new URLSearchParams(window.location.search);
      var familyId = params.get('familyId');
      var familyName = params.get('familyName') || '—';
      var familyCamp = params.get('familyCamp') || '—';
      var familyGov = params.get('familyGov') || '—';

      $('#familyId').val(familyId || '—');
      $('#familyName').val(familyName || '—');
      $('#familyCamp').val(familyCamp || '—');
      $('#familyGov').val(familyGov || '—');
      $('#familyTitle').text('العائلة');
      $('#familyMeta').text(familyName ? 'الأسرة: ' + familyName : 'الأسرة المختارة');
      $('#familyBadge').text(familyId || '—');
      renderMembers();
    });
  </script>
</body>

</html>
