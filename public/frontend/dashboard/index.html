<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>نظام إدارة الأسر النازحة</title>
  <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet" /> -->
  <link rel="stylesheet" href="css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="css/all.min.css">
  <link rel="stylesheet" href="css/css2.css">
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      font-family: 'Tajawal', sans-serif;
      background: #f0f4f8;
    }

    .splash {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .splash-logo {
      width: 60px;
      height: 60px;
      background: #1a6bb5;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 26px;
      margin-bottom: 14px;
    }
  </style>
</head>

<body>
  <div class="splash">
    <div class="splash-logo"><i class="fa-solid fa-house-circle-check"></i></div>
    <div style="font-size:18px;font-weight:700;color:#1a2332;margin-bottom:6px;">نظام إدارة الأسر النازحة</div>
    <div style="font-size:13px;color:#7a8a9a;margin-bottom:24px;">قطاع غزة</div>
    <div class="spinner-border text-primary" style="width:28px;height:28px;"></div>
  </div>
  <!-- <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script> -->
   <script src="js/jquery-3.7.1.min.js"></script>
  <script src="js/auth.js"></script>
  <script>
    $(document).ready(function () {
      var s = NDS.auth.getSession();
      if (!s) { window.location.href = 'login.html'; return; }
      setTimeout(function () {
        window.location.href = s.role === 'data_entry' ? 'staff-dashboard.html' : 'admin-dashboard.html';
      }, 600);
    });
  </script>
</body>

</html>
