<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>التقارير والإحصاءات</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="css/all.min.css">
  <link rel="stylesheet" href="css/css2.css">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>

<body>
  <div class="d-flex" id="app-wrapper">
    <div id="main-content" class="d-flex flex-column">
      <main id="content-area" class="flex-grow-1 p-3 p-md-4">

        <div class="page-header mb-3">
          <h1 class="page-title"><i class="fa-solid fa-chart-bar me-2 text-primary"></i>التقارير والإحصاءات</h1>
        </div>

        <div class="row g-3">
          <!-- عمود الجانب: اختيار التقرير + الفلاتر -->
          <div class="col-12 col-lg-4 col-xl-3">

            <!-- نوع التقرير -->
            <div class="content-card mb-3">
              <div class="content-card__header">
                <div class="content-card__title">نوع التقرير</div>
              </div>
              <div class="content-card__body">
                <button class="report-type-btn active" data-report="demographic">
                  <div class="rt-icon" style="background:#e8f1fb;color:#1a6bb5;"><i
                      class="fa-solid fa-people-group"></i></div>
                  <div class="rt-name">تقرير ديموغرافي شامل</div>
                  <div class="rt-desc">توزيع الأسر والأفراد حسب المخيم</div>
                </button>
                <button class="report-type-btn" data-report="vulnerability">
                  <div class="rt-icon" style="background:#fdf0f0;color:#b03030;"><i
                      class="fa-solid fa-triangle-exclamation"></i></div>
                  <div class="rt-name">تقرير حالات الضعف</div>
                  <div class="rt-desc">تصنيف الأسر بحسب مستوى الضعف</div>
                </button>
                <button class="report-type-btn" data-report="transfer">
                  <div class="rt-icon" style="background:#eaf5ee;color:#1a6a2a;"><i class="fa-solid fa-right-left"></i>
                  </div>
                  <div class="rt-name">تقرير حركة النقل</div>
                  <div class="rt-desc">إحصاءات طلبات النقل والقرارات</div>
                </button>
                <button class="report-type-btn" data-report="timeline">
                  <div class="rt-icon" style="background:#fdf3e0;color:#9a6010;"><i
                      class="fa-solid fa-clock-rotate-left"></i></div>
                  <div class="rt-name">تقرير زمني دوري</div>
                  <div class="rt-desc">مقارنة التسجيلات عبر الزمن</div>
                </button>
              </div>
            </div>

            <!-- معاملات التقرير -->
            <div class="content-card">
              <div class="content-card__header">
                <div class="content-card__title">معاملات التقرير</div>
              </div>
              <div class="content-card__body">
                <div class="mb-3">
                  <label class="field-label">المخيم / الموقع</label>
                  <select class="form-select" id="repCamp">
                    <option value="">كل المخيمات</option>
                  </select>
                </div>
                <div class="mb-3">
                  <label class="field-label">من تاريخ</label>
                  <input type="date" class="form-control" id="repFrom" />
                </div>
                <div class="mb-3">
                  <label class="field-label">إلى تاريخ</label>
                  <input type="date" class="form-control" id="repTo" />
                </div>
                <div class="mb-3">
                  <label class="field-label">مستوى الضعف</label>
                  <select class="form-select" id="repLevel">
                    <option value="all">الكل</option>
                    <option value="high">عالٍ فقط</option>
                    <option value="medium">متوسط فقط</option>
                    <option value="low">منخفض فقط</option>
                  </select>
                </div>
                <button class="btn btn-primary w-100" id="btnGenerate">
                  <i class="fa-solid fa-chart-line me-1"></i>توليد التقرير
                </button>
              </div>
            </div>
          </div>

          <!-- عمود المعاينة -->
          <div class="col-12 col-lg-8 col-xl-9">
            <div class="content-card">
              <div class="content-card__header d-flex justify-content-between align-items-center flex-wrap gap-2">
                <div>
                  <div class="content-card__title" id="previewTitle">معاينة: تقرير ديموغرافي شامل</div>
                  <div style="font-size:12px;color:#7a8a9a;margin-top:2px;" id="previewMeta">كل المخيمات — يناير 2026
                    إلى أبريل 2026</div>
                </div>
                <div class="d-flex gap-2" id="exportBtns" style="display:none!important;">
                  <button class="btn btn-sm btn-outline-success" id="btnExportExcel">
                    <i class="fa-solid fa-file-excel me-1"></i>Excel
                  </button>
                  <button class="btn btn-sm btn-outline-danger" id="btnExportPdf">
                    <i class="fa-solid fa-file-pdf me-1"></i>PDF
                  </button>
                  <button class="btn btn-sm btn-outline-secondary" id="btnPrint">
                    <i class="fa-solid fa-print me-1"></i>طباعة
                  </button>
                </div>
              </div>

              <!-- حالة التوليد -->
              <div id="generateLoading" class="d-none text-center py-5">
                <div class="spinner-border text-primary mb-3" style="width:40px;height:40px;"></div>
                <div style="font-size:14px;color:#5a6a7a;">جارٍ توليد التقرير...</div>
              </div>

              <!-- حالة فارغة -->
              <div id="previewEmpty" class="text-center py-5">
                <div style="font-size:42px;color:#dde4ee;"><i class="fa-solid fa-chart-bar"></i></div>
                <div style="font-size:14px;color:#9aaabb;margin-top:10px;">اضبط المعاملات ثم اضغط "توليد التقرير"</div>
              </div>

              <!-- محتوى التقرير -->
              <div id="previewContent" class="content-card__body d-none">

                <!-- بطاقات الملخص -->
                <div class="row g-2 mb-4" id="summaryCards"></div>

                <!-- الرسم البياني -->
                <div class="mb-4" id="chartSection">
                  <div style="font-size:13px;font-weight:600;color:#1a2332;margin-bottom:12px;" id="chartTitle">التوزيع
                    الجغرافي</div>
                  <div id="chartBars"></div>
                </div>

                <!-- الجدول التفصيلي -->
                <div id="tableSection">
                  <div style="font-size:13px;font-weight:600;color:#1a2332;margin-bottom:10px;">البيانات التفصيلية</div>
                  <div class="table-responsive preview-table-wrap">
                    <table class="table table-hover mb-0" id="reportTable">
                      <thead id="reportTableHead"></thead>
                      <tbody id="reportTableBody"></tbody>
                    </table>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script>
    $(document).ready(function () {
      if (!NDS.auth.guardPage('reports')) return;
      NDS.applyPermissions();

      var currentReport = 'demographic';
      var campsById = {};
      var hasGenerated = false;

      var summaryMappings = {
        demographic: [
          { key: 'total_families', label: 'إجمالي الأسر', icon: 'fa-house-chimney-user', color: 'blue' },
          { key: 'total_individuals', label: 'إجمالي الأفراد', icon: 'fa-people-group', color: 'green' },
          { key: 'vulnerable_families', label: 'الأسر الضعيفة', icon: 'fa-triangle-exclamation', color: 'red' },
          { key: 'pwd', label: 'ذوو الإعاقة', icon: 'fa-wheelchair', color: 'amber' },
          { key: 'female_headed', label: 'أسر برئاسة أنثى', icon: 'fa-venus', color: 'red' }
        ],
        vulnerability: [
          { key: 'high', label: 'ضعف عالٍ', icon: 'fa-triangle-exclamation', color: 'red' },
          { key: 'medium', label: 'ضعف متوسط', icon: 'fa-circle-half-stroke', color: 'amber' },
          { key: 'low', label: 'ضعف منخفض', icon: 'fa-circle-check', color: 'green' },
          { key: 'average_score', label: 'متوسط الدرجة', icon: 'fa-gauge-high', color: 'blue', suffix: ' / 100' }
        ],
        transfer: [
          { key: 'total_requests', label: 'إجمالي الطلبات', icon: 'fa-list', color: 'blue' },
          { key: 'approved', label: 'موافق عليها', icon: 'fa-circle-check', color: 'green' },
          { key: 'rejected', label: 'مرفوضة', icon: 'fa-ban', color: 'red' },
          { key: 'pending', label: 'معلقة', icon: 'fa-hourglass-half', color: 'amber' }
        ],
        timeline: []
      };

      var tableMappings = {
        demographic: {
          rows: function (data) { return data.details || []; },
          columns: [
            { key: 'camp_name', label: 'المخيم' },
            { key: 'families', label: 'الأسر' },
            { key: 'individuals', label: 'الأفراد' },
            { key: 'vulnerable', label: 'الأسر الضعيفة' },
            { key: 'pwd', label: 'ذوو الإعاقة' },
            { key: 'female_headed', label: 'برئاسة أنثى' }
          ],
          totals: function (data) {
            return data.totals ? Object.assign({ camp_name: 'الإجمالي' }, data.totals) : null;
          }
        },
        vulnerability: {
          rows: function (data) { return data.distribution_by_camp || []; },
          columns: [
            { key: 'camp', label: 'المخيم' },
            { key: 'high', label: 'عالٍ' },
            { key: 'medium', label: 'متوسط' },
            { key: 'low', label: 'منخفض' },
            { key: 'total', label: 'الإجمالي' },
            { key: 'high_percentage', label: 'نسبة العالي', suffix: '%' }
          ]
        },
        transfer: {
          rows: function (data) { return data.monthly_breakdown || []; },
          columns: [
            { key: 'month', label: 'الشهر' },
            { key: 'requests', label: 'الطلبات' },
            { key: 'approved', label: 'موافق' },
            { key: 'rejected', label: 'مرفوض' },
            { key: 'pending', label: 'معلق' }
          ]
        },
        timeline: {
          rows: function (data) { return data.details || []; },
          columns: [
            { key: 'month', label: 'الشهر' },
            { key: 'new_registrations', label: 'تسجيلات جديدة' },
            { key: 'cumulative_total', label: 'الإجمالي التراكمي' },
            { key: 'top_camp', label: 'المخيم الأعلى' },
            { key: 'top_camp_count', label: 'عدد المخيم الأعلى' }
          ]
        }
      };

      /* ── اختيار نوع التقرير ─────────────────────────────── */
      $(document).on('click', '.report-type-btn', function () {
        $('.report-type-btn').removeClass('active');
        $(this).addClass('active');
        currentReport = $(this).data('report');
        if (hasGenerated) generateReport();
      });

      function apiReportName() {
        return ({ demographic: 'demographic', vulnerability: 'vulnerability', transfer: 'transfers', timeline: 'periodic' })[currentReport] || 'demographic';
      }

      function reportParams() {
        return {
          camp_id: $('#repCamp').val(),
          date_from: $('#repFrom').val(),
          date_to: $('#repTo').val(),
          vulnerability_level: $('#repLevel').val() === 'all' ? '' : $('#repLevel').val()
        };
      }

      async function loadReportCamps() {
        try {
          var camps = await NDS.api.camps({ active: 1 });
          campsById = {};
          camps.forEach(function (camp) { campsById[String(camp.id)] = camp.name; });
          $('#repCamp').html('<option value="">كل المخيمات</option>' + camps.map(function (camp) {
            return '<option value="' + camp.id + '">' + camp.name + '</option>';
          }).join(''));
        } catch (error) {
          $('#repCamp').html('<option value="">كل المخيمات</option>');
        }
      }

      function selectedCampLabel() {
        var campId = $('#repCamp').val();
        return campId ? (campsById[String(campId)] || 'مخيم محدد') : 'كل المخيمات';
      }

      function escapeHtml(value) {
        return String(value === undefined || value === null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function formatNumber(value) {
        if (value === undefined || value === null || value === '') return '0';
        if (typeof value === 'number') return value.toLocaleString('ar-EG');
        if (!isNaN(Number(value))) return Number(value).toLocaleString('ar-EG');
        return value;
      }

      function formatCardValue(value, mapping) {
        if (typeof value === 'object' && value !== null) {
          var count = formatNumber(value.count || 0);
          return value.percentage !== undefined ? count + ' (' + formatNumber(value.percentage) + '%)' : count;
        }
        return formatNumber(value) + (mapping.suffix || '');
      }

      function summaryCards(data) {
        if (currentReport === 'timeline') {
          return (data.summary_cards || []).slice(-4).map(function (row) {
            return {
              label: row.month || 'فترة',
              value: formatNumber(row.new_registrations || 0),
              icon: 'fa-calendar-days',
              color: 'blue'
            };
          });
        }

        var summary = data.summary || {};
        return (summaryMappings[currentReport] || []).map(function (mapping) {
          return {
            label: mapping.label,
            value: formatCardValue(summary[mapping.key], mapping),
            icon: mapping.icon,
            color: mapping.color
          };
        });
      }

      function renderSummaryCards(data) {
        var cards = summaryCards(data);
        if (!cards.length) {
          $('#summaryCards').html('<div class="col-12 text-center text-muted py-3">لا توجد مؤشرات متاحة</div>');
          return;
        }
        $('#summaryCards').html(cards.map(function (card) {
          return '<div class="col-6 col-xl-3"><div class="stat-card stat-card--' + card.color + '" style="padding:12px 14px;box-shadow:none;"><div class="stat-card__icon" style="width:38px;height:38px;font-size:16px;"><i class="fa-solid ' + card.icon + '"></i></div><div class="stat-card__body"><div class="stat-card__label">' + escapeHtml(card.label) + '</div><div class="stat-card__value" style="font-size:22px;">' + escapeHtml(card.value) + '</div></div></div></div>';
        }).join(''));
      }

      function chartRows(data) {
        if (currentReport === 'demographic') {
          return (data.distribution || []).map(function (row) {
            return { label: row.camp_name || 'غير محدد', value: Number(row.families || 0) };
          });
        }
        if (currentReport === 'vulnerability') {
          return (data.distribution_by_camp || []).map(function (row) {
            return { label: row.camp || 'غير محدد', value: Number(row.high || 0) };
          });
        }
        if (currentReport === 'transfer') {
          return (data.distribution_by_camp || []).map(function (row) {
            return { label: row.camp_name || 'غير محدد', value: Number(row.requests || 0) };
          });
        }
        return (data.monthly_chart || []).map(function (row) {
          return { label: row.month || 'فترة', value: Number(row.new_registrations || 0) };
        });
      }

      function chartTitle() {
        return {
          demographic: 'توزيع الأسر حسب المخيم',
          vulnerability: 'توزيع الضعف العالي حسب المخيم',
          transfer: 'الطلبات حسب مخيم المصدر',
          timeline: 'التسجيلات الشهرية'
        }[currentReport] || 'البيانات';
      }

      function renderReportChart(data) {
        var rows = chartRows(data);
        var max = rows.reduce(function (highest, row) { return Math.max(highest, row.value); }, 0);
        $('#chartTitle').text(chartTitle());

        if (!rows.length || max === 0) {
          $('#chartBars').html('<div class="text-center text-muted py-4">لا توجد بيانات للرسم البياني</div>');
          return;
        }

        $('#chartBars').html('<div class="geo-bars">' + rows.map(function (row) {
          var percent = Math.max(2, Math.round((row.value / max) * 100));
          return '<div class="geo-bar-item"><div class="geo-bar-label"><span class="geo-bar-name">' + escapeHtml(row.label) + '</span><span class="geo-bar-val">' + formatNumber(row.value) + '</span></div><div class="geo-bar-track"><div class="geo-bar-fill" style="width:' + percent + '%;"></div></div></div>';
        }).join('') + '</div>');
      }

      function formatCell(row, column) {
        var value = row[column.key];
        if (value === undefined || value === null || value === '') value = '-';
        else if (typeof value === 'number') value = formatNumber(value);
        else if (!isNaN(Number(value)) && value !== '-') value = formatNumber(value);
        return escapeHtml(value) + (column.suffix && value !== '-' ? column.suffix : '');
      }

      function renderReportTable(data) {
        var config = tableMappings[currentReport];
        var rows = config.rows(data);
        var totals = config.totals ? config.totals(data) : null;
        var colCount = config.columns.length;

        $('#reportTableHead').html('<tr>' + config.columns.map(function (column) {
          return '<th>' + escapeHtml(column.label) + '</th>';
        }).join('') + '</tr>');

        if (!rows.length && !totals) {
          $('#reportTableBody').html('<tr><td colspan="' + colCount + '" class="text-center text-muted py-4">لا توجد بيانات ضمن المعاملات المحددة</td></tr>');
          return;
        }

        var body = rows.map(function (row) {
          return '<tr>' + config.columns.map(function (column) {
            return '<td>' + formatCell(row, column) + '</td>';
          }).join('') + '</tr>';
        }).join('');

        if (totals) {
          body += '<tr class="table-light fw-bold">' + config.columns.map(function (column) {
            return '<td>' + formatCell(totals, column) + '</td>';
          }).join('') + '</tr>';
        }

        $('#reportTableBody').html(body);
      }

      /* ── توليد التقرير ──────────────────────────────────── */
      async function generateReport() {
        hasGenerated = true;
        $('#previewEmpty').addClass('d-none');
        $('#previewContent').addClass('d-none');
        $('#reportTableHead').html('');
        $('#reportTableBody').html('<tr><td class="text-center text-muted py-4">جارٍ تحميل البيانات...</td></tr>');
        $('#chartBars').html('<div class="text-center text-muted py-4">جارٍ تحميل الرسم البياني...</div>');
        $('#generateLoading').removeClass('d-none');
        try {
          var data = await NDS.api.report(apiReportName(), reportParams());
          $('#generateLoading').addClass('d-none');
          $('#previewContent').removeClass('d-none');
          $('#exportBtns').css('display', 'flex');
          $('#previewTitle').text('معاينة: ' + $('.report-type-btn.active .rt-name').text());
          $('#previewMeta').text(selectedCampLabel() + ' — ' + (($('#repFrom').val() || 'البداية') + ' إلى ' + ($('#repTo').val() || 'اليوم')));
          renderSummaryCards(data);
          renderReportChart(data);
          renderReportTable(data);
        } catch (error) {
          $('#generateLoading').addClass('d-none');
          $('#previewEmpty').removeClass('d-none').html('<i class="fa-solid fa-circle-exclamation" style="font-size:46px;color:#b03030;display:block;margin-bottom:12px;"></i><div style="font-size:15px;font-weight:500;color:#b03030;">' + (error.message || 'تعذر توليد التقرير') + '</div>');
        }
      }

      $('#btnGenerate').on('click', generateReport);

      $('#repCamp,#repFrom,#repTo,#repLevel').on('change', function () {
        if (hasGenerated) generateReport();
      });

      /* ── أزرار التصدير ──────────────────────────────────── */
      $('#btnExportExcel').on('click', async function () {
        var $btn = $(this);
        try {
          $btn.prop('disabled', true);
          await NDS.api.downloadFile(
            '/reports/' + encodeURIComponent(apiReportName()) + '/export/excel' + NDS.api.query(reportParams()),
            apiReportName() + '_report.xlsx'
          );
        } catch (error) {
          alert(error.message || 'تعذر تصدير Excel');
        } finally {
          $btn.prop('disabled', false);
        }
      });
      $('#btnExportPdf').on('click', async function () {
        var $btn = $(this);
        try {
          $btn.prop('disabled', true);
          await NDS.api.downloadFile(
            '/reports/' + encodeURIComponent(apiReportName()) + '/export/pdf' + NDS.api.query(reportParams()),
            apiReportName() + '_report.pdf'
          );
        } catch (error) {
          alert(error.message || 'تعذر تصدير PDF');
        } finally {
          $btn.prop('disabled', false);
        }
      });
      $('#btnPrint').on('click', function () { window.print(); });

      loadReportCamps();
    });
  </script>
</body>

</html>
