<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>إدارة المستخدمين</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="css/css2.css">
  <link rel="stylesheet" href="css/all.min.css">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>

<body>
  <div class="d-flex" id="app-wrapper">
    <div id="main-content" class="d-flex flex-column">
      <main id="content-area" class="flex-grow-1 p-3 p-md-4">

        <div class="page-header d-flex justify-content-between align-items-center mb-3">
          <h1 class="page-title"><i class="fa-solid fa-users-gear me-2 text-primary"></i>إدارة المستخدمين</h1>
          <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#userModal" id="btnAddUser">
            <i class="fa-solid fa-plus me-1"></i>مستخدم جديد
          </button>
        </div>

        <!-- إحصاءات سريعة -->
        <div class="row g-3 mb-3">
          <div class="col-6 col-md-3">
            <div class="stat-card stat-card--blue">
              <div class="stat-card__icon"><i class="fa-solid fa-users"></i></div>
              <div class="stat-card__body">
                <div class="stat-card__label">إجمالي المستخدمين</div>
                <div class="stat-card__value" id="usersTotalCount">0</div>
              </div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="stat-card stat-card--green">
              <div class="stat-card__icon"><i class="fa-solid fa-circle-dot"></i></div>
              <div class="stat-card__body">
                <div class="stat-card__label">نشطون</div>
                <div class="stat-card__value" id="usersActiveCount">0</div>
              </div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="stat-card stat-card--amber">
              <div class="stat-card__icon"><i class="fa-solid fa-user-pen"></i></div>
              <div class="stat-card__body">
                <div class="stat-card__label">موظفو إدخال</div>
                <div class="stat-card__value" id="usersDataEntryCount">0</div>
              </div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="stat-card stat-card--red">
              <div class="stat-card__icon"><i class="fa-solid fa-user-slash"></i></div>
              <div class="stat-card__body">
                <div class="stat-card__label">معطّلون</div>
                <div class="stat-card__value" id="usersInactiveCount">0</div>
              </div>
            </div>
          </div>
        </div>

        <!-- شريط البحث والفلاتر -->
        <div class="page-toolbar mb-3">
          <div class="toolbar-title">قائمة المستخدمين</div>
          <div class="toolbar-actions">
            <div style="position:relative;">
              <i class="fa-solid fa-search"
                style="position:absolute;right:10px;top:50%;transform:translateY(-50%);color:#9aaabb;font-size:13px;pointer-events:none;"></i>
              <input type="text" id="userSearch" class="form-control form-control-sm"
                placeholder="بحث بالاسم أو البريد..." style="padding-right:30px;width:200px;" />
            </div>
            <select class="form-select form-select-sm" id="roleFilter" style="width:140px;">
              <option value="all">كل الأدوار</option>
              <option value="admin">مدير النظام</option>
              <option value="manager">مدير المنظمة</option>
              <option value="data_entry">موظف إدخال</option>
            </select>
            <select class="form-select form-select-sm" id="statusFilter" style="width:130px;">
              <option value="all">كل الحالات</option>
              <option value="active">نشط</option>
              <option value="inactive">معطّل</option>
            </select>
          </div>
        </div>

        <!-- قائمة المستخدمين -->
        <div id="usersList"></div>

        <!-- Pagination -->
        <nav class="mt-3" id="paginationWrap">
          <ul class="pagination justify-content-center mb-0">
            <li class="page-item disabled"><a class="page-link">السابق</a></li>
            <li class="page-item active"><a class="page-link">1</a></li>
            <li class="page-item"><a class="page-link">2</a></li>
            <li class="page-item"><a class="page-link">3</a></li>
            <li class="page-item"><a class="page-link">التالي</a></li>
          </ul>
        </nav>

      </main>
    </div>
  </div>

  <!-- مودال إضافة/تعديل مستخدم -->
  <div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="userModalTitle"><i class="fa-solid fa-user-plus me-2 text-primary"></i>إضافة
            مستخدم جديد</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-12 col-sm-6">
              <label class="field-label">الاسم الكامل <span class="field-required">*</span></label>
              <input type="text" id="umName" class="form-control" placeholder="الاسم الكامل" />
            </div>
            <div class="col-12 col-sm-6">
              <label class="field-label">البريد الإلكتروني <span class="field-required">*</span></label>
              <input type="email" id="umEmail" class="form-control" placeholder="example@org.ps" />
            </div>
            <div class="col-12 col-sm-6">
              <label class="field-label">اسم المستخدم <span class="field-required">*</span></label>
              <input type="text" id="umUsername" class="form-control" placeholder="username" />
            </div>
            <div class="col-12 col-sm-6">
              <label class="field-label">كلمة المرور <span class="field-required">*</span></label>
              <input type="password" id="umPassword" class="form-control" placeholder="8 أحرف على الأقل" />
            </div>
            <div class="col-12 col-sm-6">
              <label class="field-label">الدور الوظيفي <span class="field-required">*</span></label>
              <select class="form-select" id="umRole">
                <option value="">اختر الدور...</option>
                <option value="admin">مدير النظام</option>
                <option value="manager">مدير المنظمة</option>
                <option value="data_entry">موظف إدخال بيانات</option>
              </select>
            </div>
            <div class="col-12 col-sm-6" id="campFieldWrap">
              <label class="field-label">المخيم المُعيَّن</label>
              <select class="form-select" id="umCamp">
                <option value="">اختر المخيم...</option>
                <option>مخيم جباليا</option>
                <option>مخيم خان يونس</option>
                <option>مواصي رفح</option>
                <option>مخيم النصيرات</option>
                <option>مخيم البريج</option>
              </select>
            </div>
            <div class="col-12">
              <label class="field-label">رقم الهاتف</label>
              <input type="tel" id="umPhone" class="form-control" placeholder="05X-XXX-XXXX" />
            </div>
            <div class="col-12">
              <div class="toggle-wrap">
                <span class="toggle-text">تفعيل الحساب فوراً</span>
                <div class="form-check form-switch mb-0">
                  <input class="form-check-input" type="checkbox" id="umActive" checked />
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline-secondary" data-bs-dismiss="modal">إلغاء</button>
          <button class="btn btn-primary" id="btnSaveUser">
            <i class="fa-solid fa-check me-1"></i>حفظ المستخدم
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- مودال تأكيد الحذف -->
  <div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-body text-center py-4">
          <div style="font-size:36px;color:#b03030;margin-bottom:10px;"><i class="fa-solid fa-circle-exclamation"></i>
          </div>
          <div style="font-size:15px;font-weight:600;color:#1a2332;">هل أنت متأكد؟</div>
          <div style="font-size:13px;color:#7a8a9a;margin-top:5px;" id="deleteUserName">سيتم حذف هذا المستخدم</div>
          <div class="d-flex gap-2 justify-content-center mt-4">
            <button class="btn btn-outline-secondary" data-bs-dismiss="modal">إلغاء</button>
            <button class="btn btn-danger" id="btnConfirmDelete">تأكيد الحذف</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
    <script>
    $(document).ready(function () {
      if (!NDS.auth.guardPage('users')) return;
      NDS.applyPermissions();

      var users = [];
      var camps = [];
      var deleteTargetId = null;

      function labelRole(role) {
        return ({ admin: 'مدير النظام', manager: 'مدير المنظمة', data_entry: 'موظف إدخال' })[role] || role;
      }

      function initials(name) {
        return (name || '').split(' ').slice(0, 2).map(function (w) { return w[0]; }).join('.') || '؟';
      }

      function formatNumber(value) {
        return Number(value || 0).toLocaleString('ar-EG');
      }

      function mapUser(u) {
        var camp = camps.find(function (c) { return c.id === u.camp_id; });
        return {
          id: u.id,
          name: u.name,
          username: u.email,
          email: u.email,
          role: u.role,
          roleLabel: labelRole(u.role),
          camp_id: u.camp_id || '',
          camp: camp ? camp.name : '—',
          status: u.is_active === false ? 'inactive' : 'active',
          phone: u.phone || '',
          avatar: initials(u.name),
          avatarBg: ({ admin: '#e8f1fb', manager: '#eaf5ee', data_entry: '#fdf3e0' })[u.role] || '#f5f5f5',
          avatarColor: ({ admin: '#1a6bb5', manager: '#1a6a2a', data_entry: '#9a6010' })[u.role] || '#7a8a9a'
        };
      }

      async function loadCamps() {
        camps = await NDS.api.camps();
        $('#umCamp').html('<option value="">اختر المخيم...</option>' + camps.map(function (camp) {
          return '<option value="' + camp.id + '">' + camp.name + '</option>';
        }).join(''));
      }

      async function loadUserStatistics() {
        var stats = await NDS.api.usersStatistics();
        $('#usersTotalCount').text(formatNumber(stats.total_users));
        $('#usersActiveCount').text(formatNumber(stats.active_users));
        $('#usersDataEntryCount').text(formatNumber(stats.data_entry_users));
        $('#usersInactiveCount').text(formatNumber(stats.inactive_users));
      }

      async function refreshUsersPage() {
        await Promise.all([
          loadUsers(),
          loadUserStatistics()
        ]);
      }

      async function loadUsers() {
        $('#usersList').html('<div style="text-align:center;padding:40px;color:#9aaabb;">جارٍ تحميل المستخدمين...</div>');
        try {
          var response = await NDS.api.users();
          users = (response.users || response.data || []).map(mapUser);
          renderUsers();
        } catch (error) {
          $('#usersList').html('<div style="text-align:center;padding:40px;color:#b03030;">' + (error.message || 'تعذر تحميل المستخدمين') + '</div>');
        }
      }

      function renderUsers() {
        var q = $('#userSearch').val().toLowerCase();
        var role = $('#roleFilter').val();
        var status = $('#statusFilter').val();
        var filtered = users.filter(function (u) {
          var mq = !q || u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q);
          var mr = role === 'all' || u.role === role;
          var ms = status === 'all' || u.status === status;
          return mq && mr && ms;
        });

        if (!filtered.length) {
          $('#usersList').html('<div style="text-align:center;padding:40px;color:#9aaabb;"><i class="fa-solid fa-user-slash" style="font-size:32px;display:block;margin-bottom:10px;"></i>لا توجد مستخدمون مطابقون</div>');
          return;
        }

        $('#usersList').html(filtered.map(function (u) {
          return '<div class="user-card" data-id="' + u.id + '"><div class="uc-avatar" style="background:' + u.avatarBg + ';color:' + u.avatarColor + ';">' + u.avatar + '</div><div class="uc-status-dot ' + (u.status === 'active' ? 'active' : 'inactive') + '" title="' + (u.status === 'active' ? 'نشط' : 'معطّل') + '"></div><div style="flex:1;min-width:0;"><div class="uc-name">' + u.name + '</div><div class="uc-email">' + u.email + '</div></div><div class="d-none d-sm-block"><span class="uc-role ' + u.role + '">' + u.roleLabel + '</span></div><div class="d-none d-md-block" style="font-size:12px;color:#7a8a9a;min-width:100px;">' + u.camp + '</div><div class="d-flex gap-1"><button class="btn btn-xs btn-outline-primary btn-edit-user" data-id="' + u.id + '" title="تعديل"><i class="fa-solid fa-pen"></i></button><button class="btn btn-xs ' + (u.status === 'active' ? 'btn-outline-warning' : 'btn-outline-success') + ' btn-toggle-status" data-id="' + u.id + '" title="' + (u.status === 'active' ? 'تعطيل' : 'تفعيل') + '"><i class="fa-solid ' + (u.status === 'active' ? 'fa-ban' : 'fa-check') + '"></i></button><button class="btn btn-xs btn-outline-danger btn-delete-user" data-id="' + u.id + '" title="حذف"><i class="fa-solid fa-trash"></i></button></div></div>';
        }).join(''));
      }

      $('#userSearch, #roleFilter, #statusFilter').on('input change', renderUsers);
      $('#umRole').on('change', function () { $('#campFieldWrap').toggle($(this).val() === 'data_entry'); });

      $(document).on('click', '.btn-edit-user', function (e) {
        e.stopPropagation();
        var id = Number($(this).data('id'));
        var u = users.find(function (x) { return x.id === id; });
        if (!u) return;
        $('#userModalTitle').html('<i class="fa-solid fa-user-pen me-2 text-warning"></i>تعديل المستخدم');
        $('#umName').val(u.name);
        $('#umEmail').val(u.email);
        $('#umUsername').val(u.username);
        $('#umPassword').val('');
        $('#umRole').val(u.role).trigger('change');
        $('#umCamp').val(u.camp_id || '');
        $('#umPhone').val(u.phone);
        $('#umActive').prop('checked', u.status === 'active');
        $('#btnSaveUser').data('editId', id);
        new bootstrap.Modal($('#userModal')[0]).show();
      });

      $('#btnSaveUser').on('click', async function () {
        var payload = {
          name: $('#umName').val().trim(),
          email: $('#umEmail').val().trim(),
          role: $('#umRole').val(),
          phone: $('#umPhone').val().trim(),
          camp_id: $('#umRole').val() === 'data_entry' ? $('#umCamp').val() : null
        };
        var password = $('#umPassword').val();
        if (password) payload.password = password;
        if (!payload.name || !payload.email || !payload.role) { alert('يرجى ملء الحقول الإلزامية.'); return; }
        var editId = $(this).data('editId');
        try {
          if (editId) await NDS.api.updateUser(editId, payload);
          else await NDS.api.createUser(payload);
          bootstrap.Modal.getInstance($('#userModal')[0]).hide();
          $('#btnSaveUser').removeData('editId');
          await refreshUsersPage();
        } catch (error) {
          alert(error.message || 'تعذر حفظ المستخدم');
        }
      });

      $(document).on('click', '.btn-toggle-status', async function (e) {
        e.stopPropagation();
        try { await NDS.api.toggleUserStatus($(this).data('id')); await refreshUsersPage(); }
        catch (error) { alert(error.message || 'تعذر تغيير حالة المستخدم'); }
      });

      $(document).on('click', '.btn-delete-user', function (e) {
        e.stopPropagation();
        deleteTargetId = Number($(this).data('id'));
        var u = users.find(function (x) { return x.id === deleteTargetId; });
        $('#deleteUserName').text('سيتم حذف: ' + (u ? u.name : ''));
        new bootstrap.Modal($('#deleteModal')[0]).show();
      });

      $('#btnConfirmDelete').on('click', async function () {
        try {
          await NDS.api.deleteUser(deleteTargetId);
          bootstrap.Modal.getInstance($('#deleteModal')[0]).hide();
          await refreshUsersPage();
        } catch (error) { alert(error.message || 'تعذر حذف المستخدم'); }
      });

      $('#btnAddUser').on('click', function () {
        $('#userModalTitle').html('<i class="fa-solid fa-user-plus me-2 text-primary"></i>إضافة مستخدم جديد');
        $('#umName,#umEmail,#umUsername,#umPassword,#umPhone').val('');
        $('#umRole').val('').trigger('change');
        $('#umCamp').val('');
        $('#umActive').prop('checked', true);
        $('#btnSaveUser').removeData('editId');
      });

      loadCamps().then(refreshUsersPage).catch(function (error) {
        $('#usersList').html('<div style="text-align:center;padding:40px;color:#b03030;">' + (error.message || 'تعذر التحميل') + '</div>');
      });
    });
  </script>
</body>

</html>
